name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Ruff
        run: ruff check src tests
      - name: Unit tests
        run: python -m pytest -q
      - name: Smoke test CLI
        run: python run.py doctor
      - name: Build distributions
        if: matrix.python-version == '3.12'
        run: python -m build --sdist --wheel
      - name: Smoke test wheel install
        if: matrix.python-version == '3.12'
        run: |
          python -m venv /tmp/packguard-wheel
          /tmp/packguard-wheel/bin/pip install --upgrade pip
          /tmp/packguard-wheel/bin/pip install dist/*.whl
          /tmp/packguard-wheel/bin/python -m packguard doctor
      - name: Smoke test Docker image
        if: matrix.python-version == '3.12'
        run: |
          docker build -t packguard:ci .
          docker run --rm packguard:ci doctor
